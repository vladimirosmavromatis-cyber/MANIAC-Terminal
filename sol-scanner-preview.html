<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #010409;
  --bg-secondary: #0d1117;
  --bg-tertiary: #161b22;
  --bg-panel: #0a0e14;
  --border: #21262d;
  --border-subtle: rgba(33,38,45,0.27);
  --text: #c9d1d9;
  --text-bright: #e6edf3;
  --text-muted: #484f58;
  --text-link: #58a6ff;
  --green: #22c55e;
  --red: #f85149;
  --yellow: #e3b341;
  --cyan: #00e5ff;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; }
a { color: inherit; text-decoration: none; }
button { background: none; border: none; cursor: pointer; font-family: inherit; color: inherit; }
input, select { font-family: inherit; color: var(--text); background: var(--bg-tertiary); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(.8); } }
@keyframes spin-anim { to { transform: rotate(360deg); } }

.spin { display: inline-block; animation: spin-anim .8s linear infinite; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse-dot 2s infinite; flex-shrink: 0; }
.tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 8px; font-weight: 800; letter-spacing: .3px; }
.copy-btn { font-size: 10px; padding: 1px 4px; color: var(--text-muted); border-radius: 2px; }
.copy-btn:hover { color: var(--text); background: var(--border); }
.tab-btn { font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 7px 12px; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.nav-tab { font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 4px 8px; border-radius: 4px; border: 1px solid transparent; white-space: nowrap; flex-shrink: 0; }
.nav-tab:hover { color: var(--text); background: var(--bg-tertiary); }
.nav-tab.active { color: var(--green); border-color: rgba(34,197,94,.27); background: rgba(34,197,94,.07); }
.wallet-btn { font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 5px; border: 1px solid rgba(34,197,94,.27); color: var(--green); background: rgba(34,197,94,.07); }
.wallet-btn:hover { background: rgba(34,197,94,.13); }
.scan-btn { background: var(--green); color: var(--bg); font-weight: 700; font-size: 12px; padding: 7px 16px; border-radius: 6px; }
.scan-btn:hover { background: #16a34a; }
.search-input { flex: 1; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; color: var(--text); font-size: 12px; outline: none; }
.search-input:focus { border-color: rgba(34,197,94,.27); }
.feed-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px; cursor: pointer; transition: border-color .15s; }
.feed-card:hover { border-color: rgba(34,197,94,.27); }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; gap: 4px; }
.stat-label { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.stat-value { font-size: 10px; font-weight: 700; color: var(--text); text-align: right; }
.sec-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 60px; }
.holder-row { display: grid; grid-template-columns: 38px 180px 1fr 90px 60px; padding: 6px 12px; border-bottom: 1px solid rgba(33,38,45,.09); align-items: center; font-size: 10px; }
.holder-row:hover { background: var(--bg-tertiary); }
.trade-row { display: grid; grid-template-columns: 55px 55px 1fr 80px 80px 80px 80px; padding: 4px 12px; border-bottom: 1px solid rgba(33,38,45,.04); font-size: 10px; align-items: center; }
.trade-row:hover { background: rgba(22,27,34,.27); }
.empty-state { padding: 40px; text-align: center; color: var(--text-muted); font-size: 12px; }
.dca-input { width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 12px; outline: none; }
.dca-input:focus { border-color: rgba(34,197,94,.27); }

/* Matrix rain bg effect */
#matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.03; font-family: monospace; font-size: 10px; color: #22c55e; overflow: hidden; }

/* Ticker */
#ticker-wrapper { overflow: hidden; background: var(--bg-secondary); border-bottom: 1px solid var(--border); height: 28px; display: flex; align-items: center; position: sticky; top: 0; z-index: 300; }
#ticker-inner { display: flex; gap: 0; white-space: nowrap; animation: ticker-scroll 60s linear infinite; }
.ticker-item { display: inline-flex; align-items: center; gap: 6px; padding: 0 16px; border-right: 1px solid var(--border); height: 28px; cursor: pointer; font-size: 10px; }
.ticker-item:hover { background: var(--bg-tertiary); }

/* Nav */
#nav { background: var(--bg-secondary); border-bottom: 2px solid var(--border); padding: 4px 8px; min-height: 82px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; position: sticky; top: 28px; z-index: 200; }

/* Search */
#search-bar { display: flex; gap: 8px; padding: 8px 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }

/* Feed grid */
#feed-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; padding: 12px; }

/* Scanner */
#scanner-view { display: none; }
#token-header { padding: 10px 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
#stats-bar { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.stat-cell { padding: 6px 12px; border-right: 1px solid var(--border); flex-shrink: 0; }
.stat-cell-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.stat-cell-value { font-size: 11px; font-weight: 700; color: var(--text); }
#scanner-body { display: grid; grid-template-columns: 220px 1fr 210px; min-height: 600px; }

/* Left panel */
#left-panel { border-right: 1px solid var(--border); background: var(--bg-panel); padding: 10px; overflow-y: auto; }
#left-panel .section { margin-bottom: 12px; }
#left-panel .section-title { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

/* Right panel */
#right-panel { border-left: 1px solid var(--border); background: var(--bg-panel); padding: 10px; overflow-y: auto; }

/* Chart area */
#chart-area { background: var(--bg-panel); position: relative; }
#chart-canvas { width: 100%; height: 100%; }

/* Candle chart mock */
.chart-mock { width: 100%; height: 420px; background: var(--bg-panel); display: flex; align-items: flex-end; padding: 10px; gap: 3px; position: relative; overflow: hidden; }

/* Logo SVG */
.logo-svg { filter: drop-shadow(0 0 8px rgba(34,197,94,.4)); }

@keyframes matrix-rain { 0% { opacity: 0.8; } 50% { opacity: 0.3; } 100% { opacity: 0.8; } }

// ── Formatters ─────────────────────────────────────────────────────────────
function fP(n) {
  if (!n) return '—';
  if (n < 0.00001) return '$' + n.toExponential(2);
  if (n < 0.001) return '$' + n.toFixed(7);
  if (n < 0.1) return '$' + n.toFixed(5);
  if (n < 10) return '$' + n.toFixed(4);
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fU(n) {
  if (!n) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}
function fPct(n) {
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function fAge(mins) {
  if (mins < 60) return mins + 'm';
  if (mins < 1440) return Math.floor(mins/60) + 'h';
  return Math.floor(mins/1440) + 'd';
}
function bp(buys, sells) {
  return Math.round((buys / (buys + sells)) * 100);
}

// ── Scanner ────────────────────────────────────────────────────────────────
function scanToken(mint) {
  const t = MOCK_TOKENS.find(x => x.mint === mint) || MOCK_TOKENS[0];
  currentToken = t;
  currentMode = 'scan';
  currentTab = 'trades';

  // Update recent scans
  recentScans = [t, ...recentScans.filter(r => r.mint !== t.mint)].slice(0, 8);
  buildRecentScans();

  document.getElementById('feed-view').style.display = 'none';
  document.getElementById('scanner-view').style.display = 'block';
  document.querySelector('.nav-tab').classList.remove('active');

  buildTokenHeader(t);
  buildStatsBar(t);
  buildLeftPanel(t);
  buildChartToolbar();
  buildTabsBar();
  buildTabContent(currentTab, t);
  buildRightPanel(t);
  drawChart(t);
}

function updateDCA() {
  const amt = +(document.getElementById('dca-amt')?.value || 50);
  const periods = +(document.getElementById('dca-periods')?.value || 12);
  const total = amt * periods;
  const price = currentToken?.price || 0.00002341;
  const tokensPerPeriod = amt / price;
  const totalTokens = tokensPerPeriod * periods;
  const res = document.getElementById('dca-results');
  if (!res) return;
  res.innerHTML = `
    <div class="stat-row"><span class="stat-label">Total Invested</span><span class="stat-value">${fU(total)}</span></div>
    <div class="stat-row"><span class="stat-label">Tokens per period</span><span class="stat-value">${tokensPerPeriod.toLocaleString('en-US', {maximumFractionDigits:0})}</span></div>

function drawChart(t) {
  const canvas = document.getElementById('chart-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;

  const NUM = 80;
  // Generate mock OHLCV data
  const candles = [];
  let price = t.price;
  for (let i = 0; i < NUM; i++) {
    const open = price;
    const change = (Math.random() - 0.48) * 0.03;
    const close = open * (1 + change);
    const high = Math.max(open, close) * (1 + Math.random() * 0.015);
    const low = Math.min(open, close) * (1 - Math.random() * 0.015);
    candles.push({ o: open, h: high, l: low, c: close });
    price = close;
  }

  // Add recent price trend
  const lastIdx = candles.length - 1;
  candles[lastIdx].c = t.price;

  const prices = candles.flatMap(c => [c.h, c.l]);
  const minP = Math.min(...prices) * 0.998;
  const maxP = Math.max(...prices) * 1.002;
  const range = maxP - minP;

  const pad = { top: 20, right: 60, bottom: 30, left: 10 };
  const cW = (W - pad.left - pad.right) / NUM;
  const pH = H - pad.top - pad.bottom;

  ctx.fillStyle = '#0a0e14';
