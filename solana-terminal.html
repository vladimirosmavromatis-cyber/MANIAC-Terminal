html,body{height:100%;background:#010409;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:12px;overflow:hidden;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}

*{scrollbar-width:thin;scrollbar-color:#21262d #0d1117}

/* TICKER */
#tbar{background:#0d1117;border-bottom:1px solid #21262d;height:26px;overflow:hidden;flex-shrink:0}
#tbar-in{display:flex;animation:ticker 90s linear infinite;white-space:nowrap}

.ntab{font-size:10px;font-weight:700;color:#484f58;padding:3px 7px;border-radius:4px;white-space:nowrap;border:1px solid transparent;display:flex;align-items:center;gap:3px;flex-shrink:0}

.ntab.act{color:#22c55e;border-color:#22c55e44;background:#22c55e11}
.n-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;overflow:hidden}
.wallet-btn{font-size:10px;font-weight:700;padding:4px 9px;border-radius:4px;border:1px solid #22c55e44;color:#22c55e;background:#22c55e11;white-space:nowrap;flex-shrink:0}

.h-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#161b22;border-radius:10px;border:1px solid #21262d;font-size:10px;white-space:nowrap;flex-shrink:0}
.h-pill .lbl{color:#484f58;font-size:9px;margin-right:2px}
#upd-ts{font-size:9px;color:#484f58;flex-shrink:0}
#btn-ref{font-size:10px;font-weight:700;color:#00cfcf;padding:3px 10px;border:1px solid #21262d;border-radius:4px;background:#161b22;flex-shrink:0}
#btn-ref:hover{background:#00cfcf;color:#010409}

/* SCAN BAR */
#scan-bar{background:#0d1117;border-bottom:1px solid #21262d;padding:6px 10px;display:flex;gap:6px;flex-shrink:0}
#scan-bar input{flex:1;background:#161b22;border:1px solid #21262d;color:#c9d1d9;padding:5px 10px;border-radius:5px;font-size:12px;outline:none}
#scan-bar input:focus{border-color:#9945ff44}
#scan-bar button{background:#9945ff;border:none;color:#fff;padding:5px 14px;border-radius:5px;cursor:pointer;font-weight:700;font-size:12px}
#scan-bar button:hover{opacity:.85}

/* MAIN */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* TERMINAL TBAR */
.t-tbar{padding:5px 10px;background:#0d1117;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.t-tbar select{background:#161b22;border:1px solid #21262d;color:#c9d1d9;padding:3px 7px;border-radius:4px;font-size:10px;outline:none}

.t-tbar label{color:#484f58;font-size:10px}
.fbtn{padding:3px 9px;border-radius:4px;border:1px solid #21262d;cursor:pointer;font-size:9px;font-weight:800;background:#161b22;color:#484f58}

table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{position:sticky;top:0;z-index:9}
thead tr{background:#0a0d12}

td{padding:5px 10px;border-bottom:1px solid #21262d12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:#161b2240;cursor:pointer}
.nr{text-align:right;font-variant-numeric:tabular-nums}

.r-med{background:#e3b34122;color:#e3b341;border:1px solid #e3b34144}
.r-high{background:#f8514922;color:#f85149;border:1px solid #f8514944}
.r-rug{background:#f8514933;color:#f85149;border:1px solid #f85149}
.sb{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:800}
.s-buy{background:#22c55e22;color:#22c55e}
.s-sell{background:#f8514922;color:#f85149}
.s-watch{background:#58a6ff22;color:#58a6ff}
.s-avoid{background:#48505822;color:#484f58}
.up{color:#22c55e;font-weight:700}
.dn{color:#f85149;font-weight:700}
.nu{color:#484f58}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:800;letter-spacing:.3px}

.empty-state{padding:40px;text-align:center;color:#484f58}
.spin{display:inline-block;animation:spin .8s linear infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0;display:inline-block}

.tok-hdr{padding:8px 10px;background:#0d1117;border-bottom:1px solid #21262d;flex-shrink:0}
.tok-statsbar{display:flex;border-bottom:1px solid #21262d;overflow-x:auto;scrollbar-width:none;flex-shrink:0}

.tstat{padding:5px 10px;border-right:1px solid #21262d;flex-shrink:0}
.tstat-lbl{font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.tstat-val{font-size:11px;font-weight:700}
.padre-wrap{display:grid;grid-template-columns:195px 1fr 190px;flex:1;min-height:0;overflow:hidden}
.be-left{overflow-y:auto;border-right:1px solid #21262d;background:#0a0e14}
.be-stat-sec{padding:6px 8px;border-bottom:1px solid #21262d22}
.be-stat-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;gap:4px}
.be-stat-lbl{font-size:9px;color:#484f58;white-space:nowrap}
.be-stat-val{font-size:9px;font-weight:700;text-align:right}
.be-chg-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.be-chg-cell{background:#161b2288;border-radius:3px;padding:3px 5px;border:1px solid #21262d44}
.be-chg-tf{font-size:7px;color:#484f58;text-transform:uppercase;letter-spacing:.5px}
.be-chg-pct{font-size:11px;font-weight:800}
.be-chg-bs{font-size:8px;color:#484f58;margin-top:1px}
.be-holder-row{display:flex;align-items:center;gap:3px;padding:2px 8px;border-bottom:1px solid #21262d12;cursor:pointer}
.be-holder-row:hover{background:#161b2222}
.be-holder-bar{height:3px;border-radius:1px;min-width:2px;flex-shrink:0}
.padre-left{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.be-right{overflow-y:auto;border-left:1px solid #21262d;background:#0a0e14}
.sec-card{background:#161b22;border:1px solid #21262d;border-radius:4px;padding:6px 7px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:52px}
.sec-card-val{font-size:13px;font-weight:900;margin-bottom:2px}
.sec-card-lbl{font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px}
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:6px}
.chart-toolbar{display:flex;align-items:center;gap:2px;padding:3px 5px;background:#0d1117;border-bottom:1px solid #21262d;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.chart-toolbar::-webkit-scrollbar{display:none}
.ct-tf{font-size:10px;font-weight:600;color:#484f58;padding:2px 6px;border-radius:3px;border:1px solid transparent}
.ct-tf:hover{color:#c9d1d9;background:#161b22}
.ct-tf.act{color:#c9d1d9;background:#161b22;border-color:#21262d}
.ct-sep{width:1px;height:13px;background:#21262d;flex-shrink:0;margin:0 2px}
.chart-outer{display:flex;height:300px;overflow:hidden;flex-shrink:0}
.chart-ltoolbar{width:28px;background:#0a0e14;border-right:1px solid #21262d;display:flex;flex-direction:column;align-items:center;padding:3px 0;gap:2px;flex-shrink:0}
.ctool-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:3px;color:#484f58;font-size:11px}

.btab:hover{color:#c9d1d9}
.btab.act{color:#22c55e;border-bottom-color:#22c55e}
.tab-content{overflow-y:auto;flex:1;min-height:0;background:#010409}
.trade-row{display:grid;grid-template-columns:48px 42px 1fr 72px 72px 65px 44px;padding:3px 10px;border-bottom:1px solid #21262d08;font-size:10px;align-items:center}
.trade-row:hover{background:#161b2244}
.trade-hdr{display:grid;grid-template-columns:48px 42px 1fr 72px 72px 65px 44px;padding:4px 10px;font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.5px;font-weight:700;border-bottom:1px solid #21262d;background:#010409;position:sticky;top:0;z-index:1}
.risk-item{display:flex;gap:7px;padding:5px 10px;border-bottom:1px solid #21262d12;align-items:flex-start}
.risk-badge{font-size:8px;font-weight:800;padding:2px 4px;border-radius:3px;flex-shrink:0;margin-top:1px}
.copy-btn{font-size:10px;padding:1px 3px;color:#484f58;border-radius:2px}
.copy-btn:hover{color:#c9d1d9;background:#21262d}
.sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:7px}
.sb-item{background:#161b2288;border:1px solid #21262d44;border-radius:4px;padding:6px 7px}
.sb-val{font-size:13px;font-weight:800;margin-bottom:2px}
.sb-lbl{font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px}
.mkt-row{display:flex;gap:8px;padding:5px 10px;border-bottom:1px solid #21262d12;align-items:center;font-size:10px}
.dca-inp{background:#161b22;border:1px solid #21262d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-size:11px;outline:none;width:100%}
.dca-inp:focus{border-color:#9945ff44}

/* ANALYTICS */
.a-search{padding:10px;border-bottom:1px solid #21262d;flex-shrink:0;background:#0d1117}
.a-row{display:flex;gap:7px}
.a-row input{flex:1;background:#161b22;border:1px solid #21262d;color:#c9d1d9;padding:6px 10px;border-radius:5px;font-size:12px;outline:none}
.a-row input:focus{border-color:#9945ff44}
.a-row button{background:#9945ff;border:none;color:#fff;padding:6px 14px;border-radius:5px;cursor:pointer;font-weight:700;font-size:12px}
.a-row button:hover{opacity:.85}
.a-content{flex:1;overflow-y:auto;padding:10px}
.atcard{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:9px;margin-bottom:8px;cursor:pointer}
.atcard:hover{border-color:#9945ff44}
.atcard-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:10px;margin-top:6px}
.atcard-stat .ast-l{font-size:9px;text-transform:uppercase;color:#484f58;display:block;letter-spacing:.4px}
.atcard-stat .ast-v{font-size:11px;color:#c9d1d9;font-weight:600}

/* DISC */
#disc{background:#e3b34108;border-top:1px solid #e3b34118;padding:3px 10px;color:#e3b34177;font-size:9px;flex-shrink:0;text-align:center;letter-spacing:.3px}
.m-horn{animation:mHorn 3s ease-in-out infinite}
.m-eye-ring{animation:mEye 2.5s ease-in-out infinite}
.m-blink{animation:mBlink 4s ease-in-out infinite}
@keyframes mHorn{0%,100%{filter:drop-shadow(0 0 2px #9945ff33)}50%{filter:drop-shadow(0 0 7px #cc44ff99)}}
@keyframes mEye{0%,100%{filter:drop-shadow(0 0 3px #9945ff55)}50%{filter:drop-shadow(0 0 12px #9945ff)}}
@keyframes mBlink{0%,85%,100%{opacity:1}91%,93%{opacity:0}}
</style>
</head>

const fP = n => { if(n==null||isNaN(n))return'—';const v=+n;if(!v)return'$0';if(v<1e-7)return'$'+v.toExponential(2);if(v<0.00001)return'$'+v.toFixed(9);if(v<0.001)return'$'+v.toFixed(7);if(v<0.1)return'$'+v.toFixed(5);if(v<10)return'$'+v.toFixed(4);return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});};

const bp   = (b,s) => { const tb=+(b||0),ts=+(s||0);if(!tb&&!ts)return 50;return Math.round(tb/(tb+ts)*100);};
const ageH = ts => ts ? (Date.now()-ts)/3600000 : 9999;
const tag  = (c,t) => `<span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`;

// ── RISK ENGINE ──
function calcRisk(p) {
  const liq=p.liq||0, vol24=p.vol24||0, ch24=p.ch24||0;
  const ts=p.pairCreatedAt, buys=p.txns?.h24?.buys||0, sells=p.txns?.h24?.sells||0;
  const ratio=buys+sells>0?buys/(buys+sells):0.5;
  let score=0;
  if(liq<5000)score+=3;else if(liq<20000)score+=2;else if(liq<100000)score+=1;
  const ah=ageH(ts);
  if(ah<1)score+=3;else if(ah<6)score+=2;else if(ah<24)score+=1;
  if(vol24>0&&liq>0&&vol24/liq>20)score+=2;
  if(ch24>200)score+=2;else if(ch24>100)score+=1;else if(ch24<-50)score+=2;else if(ch24<-20)score+=1;
  if(ratio<0.3)score+=2;
  if(score>=7)return'rug';if(score>=5)return'high';if(score>=3)return'med';return'low';
}

function calcSignal(p) {
  const {risk,ch5m,ch1h,ch24,liq,vol24,txns}=p;
  if(risk==='rug')return{sig:'avoid',reason:'Rug risk — suspicious pattern'};
  if((liq||0)<5000)return{sig:'avoid',reason:'Liquidity too low (<$5k)'};
  const buys=txns?.h24?.buys||0,sells=txns?.h24?.sells||0;
  const br=buys+sells>0?buys/(buys+sells):0.5;
  const momentum=(ch5m||0)>3&&(ch1h||0)>8;
  const volStr=vol24>0&&liq>0&&vol24/liq>2;
  const buyPr=br>0.65;
  const overExt=(ch1h||0)>80||(ch24||0)>300;
  const dump=(ch1h||0)<-20||(ch24||0)<-40;
  const recovering=(ch24||0)<-20&&(ch1h||0)>10&&br>0.6;
  if(dump&&!recovering)return{sig:'sell',reason:`Dump: 1H ${(ch1h||0).toFixed(1)}%`};
  if(overExt)return{sig:'watch',reason:`Overextended — wait for pullback (1H +${(ch1h||0).toFixed(0)}%)`};
  if(recovering)return{sig:'watch',reason:'Recovering from dump — wait for confirmation'};
  if(momentum&&volStr&&buyPr&&risk!=='high')return{sig:'buy',reason:`Momentum + buy pressure (${(br*100).toFixed(0)}% buys)`};
  if(momentum&&risk!=='high')return{sig:'buy',reason:`Uptrend: 5M +${(ch5m||0).toFixed(1)}% / 1H +${(ch1h||0).toFixed(1)}%`};
  if(volStr&&buyPr)return{sig:'watch',reason:'Volume surge + buy pressure — watch for entry'};
  return{sig:'watch',reason:'No clear momentum — accumulation'};
}

const sigBadge = sig => { const c={buy:'s-buy',sell:'s-sell',watch:'s-watch',avoid:'s-avoid'};const l={buy:'BUY',sell:'SELL',watch:'WATCH',avoid:'AVOID'};return`<span class="sb ${c[sig]||'s-avoid'}">${l[sig]||sig.toUpperCase()}</span>`;};
const riskBadge= r => { const c={low:'r-low',med:'r-med',high:'r-high',rug:'r-rug'};const l={low:'LOW',med:'MED',high:'HIGH',rug:'🚨RUG'};return`<span class="rb ${c[r]||'r-high'}">${l[r]||r}</span>`;};

async function jfetch(url,opts={}) {

function parsePair(pr) {
  return {
    name:pr.baseToken?.name||'?', sym:pr.baseToken?.symbol||'?',
    addr:pr.baseToken?.address||'', pairAddr:pr.pairAddress||'',
    dex:pr.dexId||'', price:parseFloat(pr.priceUsd)||0,
    ch5m:pr.priceChange?.m5||0, ch1h:pr.priceChange?.h1||0,
    ch6h:pr.priceChange?.h6||0, ch24:pr.priceChange?.h24||0,
    vol24:pr.volume?.h24||0, liq:pr.liquidity?.usd||0,
    mcap:pr.marketCap||pr.fdv||0, txns:pr.txns,
    pairCreatedAt:pr.pairCreatedAt||null, url:pr.url||'',
    imageUrl:pr.info?.imageUrl||pr.baseToken?.imageUrl||'',
    socials:pr.info?.socials||[], websites:pr.info?.websites||[],
    priceNative:pr.priceNative||0, fdv:pr.fdv||0,
  };
}

function mergeUniq(arr,extras) {
  const seen=new Set(arr.map(p=>p.pairAddr));
  extras.forEach(p=>{if(!seen.has(p.pairAddr)){seen.add(p.pairAddr);arr.push(p);}});
  return arr;
}

function enrichPair(p) {
  p.risk=calcRisk(p);const s=calcSignal(p);p.sig=s.sig;p.reason=s.reason;return p;
}

// ── HOLDERS ──
const _B58=/^[1-9A-HJ-NP-Za-km-z]{32,44}$/;
function _b58toBytes(str){try{const ALPHA='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';let num=BigInt(0);for(const c of str){const d=ALPHA.indexOf(c);if(d<0)return null;num=num*BigInt(58)+BigInt(d);}let hex=num.toString(16);if(hex.length%2)hex='0'+hex;const bytes=[];for(let i=0;i<hex.length;i+=2)bytes.push(parseInt(hex.slice(i,i+2),16));const lead=str.match(/^1*/)[0].length;return new Uint8Array([...Array(lead).fill(0),...bytes]);}catch(_){return null;}}

async function rpcCall(method,params){
  for(const url of RPC_URLS){
    try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method,params}),signal:AbortSignal.timeout(20000)});if(!r.ok)continue;const j=await r.json();if(j.error)continue;return j.result||null;}catch(_){}
  }return null;
}

function collectLPAddresses(rug,mint){
  const lps=new Set();
  function scan(obj,d){if(!obj||d>5)return;if(typeof obj==='string'){if(_B58.test(obj))lps.add(obj);}else if(Array.isArray(obj)){obj.forEach(v=>scan(v,d+1));}else if(typeof obj==='object'){Object.values(obj).forEach(v=>scan(v,d+1));}}
  (rug?.markets||[]).forEach(m=>scan(m,0));
  if(mint)lps.delete(mint);
  lps.delete('So11111111111111111111111111111111111111112');
  lps.delete('EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v');
  return lps;
}

async function fetchHolders(mint) {
  const mbytes=_b58toBytes(mint);
  if(mbytes){
    const gpa=await rpcCall('getProgramAccounts',[TOKEN_PROG,{encoding:'jsonParsed',commitment:'confirmed',filters:[{dataSize:165},{memcmp:{offset:0,bytes:mint}}]}]);
    if(gpa&&Array.isArray(gpa)&&gpa.length){
      const lpSet=collectLPAddresses(S.rug,mint);
      (S.dex?.allPairAddresses||[]).forEach(a=>{if(a)lpSet.add(a);});
      const mStr=JSON.stringify(S.rug?.markets||[]);
      const supplyRes=await rpcCall('getTokenSupply',[mint]);
      const supply=+(supplyRes?.value?.uiAmount||0);
      const raw=gpa.map(a=>{const info=a?.account?.data?.parsed?.info;const owner=info?.owner||'';const amt=+(info?.tokenAmount?.uiAmount||0);const vault=a?.pubkey||'';if(!owner||amt===0)return null;const pct=supply>0?(amt/supply)*100:0;return{address:owner,tokenAccount:vault,pct,amount:amt,insider:false,label:''};})
        .filter(h=>{if(!h)return false;if(LP_PROGS.has(h.address))return false;if(lpSet.has(h.address)||lpSet.has(h.tokenAccount))return false;if(h.tokenAccount.length>20&&mStr.includes(h.tokenAccount))return false;if(h.address.length>20&&mStr.includes(h.address))return false;return true;})
        .sort((a,b)=>b.pct-a.pct);
      if(raw.length){S.birdeyeHolders=raw;fetchSNSNames(raw.slice(0,40).map(h=>h.address));renderMain();return;}
    }
  }
  // Fallback: rugcheck topHolders
  const rugH=S.rug?.topHolders||[];
  if(rugH.length){
    const lpSet=collectLPAddresses(S.rug,mint);(S.dex?.allPairAddresses||[]).forEach(a=>{if(a)lpSet.add(a);});
    const mStr=JSON.stringify(S.rug?.markets||[]);
    const enriched=rugH.filter(h=>{const vault=h.address||'',owner=h.owner||'';if(vault.length>20&&mStr.includes(vault))return false;if(owner.length>20&&mStr.includes(owner))return false;if(LP_PROGS.has(owner)||LP_PROGS.has(vault))return false;if(lpSet.has(owner)||lpSet.has(vault))return false;return true;}).map(h=>({address:h.owner||h.address,tokenAccount:h.address,pct:+(h.pct||0),amount:+(h.amount||0),insider:h.insider||false,label:''}));
    if(enriched.length){S.birdeyeHolders=enriched;fetchSNSNames(enriched.map(h=>h.address));}
  }
  // Holder count from GT
  try{const r=await fetch(`${GT}/networks/solana/tokens/${mint}`,{headers:{Accept:'application/json'},signal:AbortSignal.timeout(7000)});if(r.ok){const j=await r.json();const h=+(j?.data?.attributes?.holders||0);if(h>0){S.birdeye={...(S.birdeye||{}),holder:h};renderMain();}}}catch(_){}
  renderMain();
}

async function fetchSNSNames(addresses) {
  if(!addresses?.length)return;
  S.snsLoading=true;
  const results={};const chunks=[];for(let i=0;i<addresses.length;i+=8)chunks.push(addresses.slice(i,i+8));
  for(const chunk of chunks){
    await Promise.all(chunk.map(async addr=>{
      if(S.snsNames[addr]||KNOWN_LABELS[addr])return;
      try{const r=await fetch(`https://sns-sdk-proxy.bonfida.workers.dev/reverse-lookup/${addr}`,{signal:AbortSignal.timeout(3000)});if(r.ok){const j=await r.json();if(j.result&&typeof j.result==='string'&&j.result.length<64&&/^[a-zA-Z0-9_-]+$/.test(j.result))results[addr]=j.result+'.sol';}}catch(_){}
    }));
  }
  Object.assign(S.snsNames,results);S.snsLoading=false;renderMain();
}

  _lwChart.timeScale().applyOptions({rightOffset:5});
  _lwCandle=_lwChart.addCandlestickSeries({upColor:'#22c55e',downColor:'#f85149',borderUpColor:'#22c55e',borderDownColor:'#f85149',wickUpColor:'#22c55e',wickDownColor:'#f85149',priceFormat:{type:'price',precision:pp,minMove:mm}});
  const vol=_lwChart.addHistogramSeries({color:'#21262d',priceFormat:{type:'volume'},priceScaleId:'vol'});
  _lwChart.priceScale('vol').applyOptions({scaleMargins:{top:0.8,bottom:0}});
  _lwCandle.setData(data.map(c=>({time:Math.floor(c.t/1000),open:c.o,high:c.h,low:c.l,close:c.c})));
  vol.setData(data.map(c=>({time:Math.floor(c.t/1000),value:c.v,color:c.c>=c.o?'#22c55e33':'#f8514933'})));
  if(S.showEma&&data.length>=20){
    const ema=(arr,p)=>{const k=2/(p+1);let e=arr[0];return arr.map(v=>{e=v*k+e*(1-k);return e;});};
    const closes=data.map(c=>c.c);const e20=ema(closes,20),e50=ema(closes,50);
    const mkLine=col=>_lwChart.addLineSeries({color:col,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,priceFormat:{type:'price',precision:pp,minMove:mm}});
    const l20=mkLine('#e3b341'),l50=mkLine('#58a6ff');
    l20.setData(data.map((c,i)=>({time:Math.floor(c.t/1000),value:e20[i]})));
    l50.setData(data.map((c,i)=>({time:Math.floor(c.t/1000),value:e50[i]})));
  }
  if(S.dex?.pair){
    const tgt=calcTargets(S.dex.pair);
    const mkPL=(price,color,title,dashed)=>{if(!price||price<=0)return;try{_lwCandle.createPriceLine({price,color,lineWidth:1,lineStyle:dashed?LightweightCharts.LineStyle.Dashed:LightweightCharts.LineStyle.Solid,axisLabelVisible:true,title});}catch(_){}};
    mkPL(tgt.sl,'#f85149','🛑 SL',true);mkPL(tgt.buyZone,'#e3b341','📥 BUY',true);mkPL(tgt.t1,'#22c55e','🎯 T1',true);mkPL(tgt.t2,'#00e5ff','🚀 T2',true);mkPL(tgt.cur,'#ffffff','● NOW',false);
  }
  _lwChart.timeScale().fitContent();
  new ResizeObserver(()=>{if(_lwChart)_lwChart.applyOptions({width:container.clientWidth,height:container.clientHeight});}).observe(container);
}

async function connectWallet(){
  if(location.protocol==='file:'){alert('To use Phantom on a local file:\n1. Open chrome://extensions\n2. Find Phantom → Enable "Allow access to file URLs"\n3. Reload this page');return;}
  const ph=window.phantom?.solana||window.solana;

  try{const r=await ph.connect();S.walletAddr=r.publicKey.toString();S.walletConnected=true;renderAll();}catch(_){}
}

function setMode(m){
  if(m===S.mode&&m!=='scan')return;
  stopTradesTimer();S.mode=m;
  if(m==='radar'&&!S.feedTokens.length&&!S.feedLoading)loadFeed();
  else if(m!=='scan'&&m!=='radar'&&!S.termLoaded&&!S.termLoading)loadTerminalData();
  renderAll();
}

function refreshAll(){
  if(S.mode==='scan'){fetchOHLCV();fetchTrades();}
  else if(S.mode==='radar')loadFeed();
  else loadTerminalData();
}

// ── TAB DISPATCH ──
function renderTabContent(pair,base,tgt){
  if(S.tab==='trades')return renderTradesTab();
  if(S.tab==='security')return renderSecurityTab();
  if(S.tab==='holders')return renderHoldersTab();
  if(S.tab==='markets')return renderMarketsTab(pair);
  if(S.tab==='technicals')return renderTechnicalsTab(pair,tgt);
  if(S.tab==='dca')return renderDCATab(pair);
  return '';
}

function renderTradesTab(){
  if(S.tradesLoading&&!S.trades.length)return`<div class="empty-state"><span class="spin">⟳</span> Loading trades…</div>`;
  if(!S.trades.length)return`<div class="empty-state">No trade data yet</div>`;
  const hdr=`<div class="trade-hdr"><span>Time</span><span>Type</span><span>Wallet</span><span class="nr">Amount</span><span class="nr">Price</span><span class="nr">Value</span><span></span></div>`;
  const rows=S.trades.slice(0,150).map(t=>{
    const isB=t.type==='buy';const col=isB?'#22c55e':'#f85149';
    const ts=t.timestamp?new Date(t.timestamp*1000).toLocaleTimeString():'?';
    const wn=walletName(t.wallet);
    const th=t.txHash?`<a href="https://solscan.io/tx/${esc(t.txHash)}" target="_blank" style="color:#484f58;font-size:10px">↗</a>`:'';
    return`<div class="trade-row" style="border-left:2px solid ${col}22">
      <span style="color:#484f58">${ts}</span>
      <span style="color:${col};font-weight:700">${isB?'BUY':'SELL'}</span>
      <span style="font-family:monospace;font-size:9px;color:${wn?'#e3b341':'#484f58'}" title="${esc(t.wallet)}">${esc(wn||fAddr(t.wallet))}</span>
      <span class="nr">${fN(t.amount)}</span>
      <span class="nr">${fP(t.priceUsd)}</span>
      <span class="nr" style="color:${col}">${fU(t.volumeUsd)}</span>
      <span>${th}</span>
    </div>`;
  }).join('');
  return hdr+rows;
}

function renderSecurityTab(){
  const r=S.rug;
  if(!r)return`<div class="empty-state"><span class="spin">⟳</span> Loading security report…</div>`;
  const score=r.score||r.riskScore||0;
  const scoreCol=score>700?'#f85149':score>400?'#e3b341':'#22c55e';
  const topHolderPct=(r.topHolders||[]).slice(0,10).reduce((s,h)=>s+(+h.pct||0),0);
  const checks=[
    {label:'Mint Authority',val:r.mintAuthority?'⚠ Enabled':'✓ Revoked',ok:!r.mintAuthority},
    {label:'Freeze Authority',val:r.freezeAuthority?'⚠ Enabled':'✓ Revoked',ok:!r.freezeAuthority},
    {label:'Top 10 Hold.',val:topHolderPct?topHolderPct.toFixed(1)+'%':'—',ok:topHolderPct<50},
    {label:'LP Burned',val:r.lpBurned?'✓ Yes':'⚠ No',ok:!!r.lpBurned},
    {label:'Markets',val:String(r.markets?.length||0),ok:true},
    {label:'Risk Score',val:String(score),ok:score<400},
  ];
  const risks=(r.risks||r.riskFactors||[]);
  return`<div style="padding:8px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;background:#0d1117;border-radius:6px;padding:10px;border:1px solid #21262d">
      <div style="text-align:center;padding:0 10px;border-right:1px solid #21262d">
        <div style="font-size:22px;font-weight:900;color:${scoreCol}">${score}</div>
        <div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.5px">Risk Score</div>
      </div>
      <div style="font-size:10px;color:${scoreCol};font-weight:700">${score>700?'🚨 HIGH RISK':score>400?'⚠ MEDIUM RISK':'✓ LOW RISK'}</div>
    </div>
    <div class="sb-grid">
      ${checks.map(c=>`<div class="sb-item"><div class="sb-val" style="color:${c.ok?'#22c55e':'#f85149'};font-size:12px">${c.val}</div><div class="sb-lbl">${c.label}</div></div>`).join('')}
    </div>
    ${risks.length?`<div style="margin-top:8px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#484f58;letter-spacing:.5px;margin-bottom:5px">Risk Factors</div>
      ${risks.map(rf=>`<div class="risk-item">
        <span class="risk-badge" style="background:${rf.level==='danger'?'#f8514922':'#e3b34122'};color:${rf.level==='danger'?'#f85149':'#e3b341'}">${(rf.level||'INFO').toUpperCase()}</span>
        <div><div style="font-size:10px;font-weight:700;color:#c9d1d9">${esc(rf.name||rf.title||'')}</div>
        <div style="font-size:9px;color:#484f58;margin-top:1px">${esc(rf.description||rf.message||'')}</div></div>
      </div>`).join('')}
    </div>`:''}
  </div>`;
}

  const holders=S.birdeyeHolders;
  if(!holders)return`<div class="empty-state">Loading holder data…</div>`;
  if(!holders.length)return`<div class="empty-state">No holder data available</div>`;
  const top=holders.slice(0,50);
  const hdr=`<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid #21262d;font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:#010409;z-index:1">
    <span style="width:24px">#</span><span style="flex:1">Wallet</span>
    <span style="width:55px;text-align:right">Amount</span><span style="width:45px;text-align:right">%</span>
    <span style="width:62px;text-align:right">Bar</span>
  </div>`;
  const rows=top.map((h,i)=>{
    const wn=walletName(h.address)||KNOWN_LABELS[h.address]||null;
    const barW=Math.min(h.pct*3,60);
    return`<div class="be-holder-row" onclick="window.open('https://solscan.io/account/${esc(h.address)}','_blank')">
      <span style="width:24px;font-size:9px;color:#484f58">${i+1}</span>
      <span style="flex:1;min-width:0">
        ${wn?`<span style="font-size:10px;color:#e3b341;font-weight:700;display:block">${esc(wn)}</span>`:''}
        <span style="font-family:monospace;font-size:8px;color:${wn?'#484f58':'#c9d1d9'}">${fAddr(h.address)}</span>
      </span>
      <span style="width:55px;text-align:right;font-size:9px">${fN(h.amount)}</span>
      <span style="width:45px;text-align:right;font-size:9px;font-weight:700;color:${h.pct>5?'#f85149':h.pct>2?'#e3b341':'#22c55e'}">${h.pct.toFixed(2)}%</span>
      <div style="width:62px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px">
        <div class="be-holder-bar" style="width:${barW}px;background:${h.pct>5?'#f85149':h.pct>2?'#e3b341':'#22c55e'}"></div>

function renderTechnicalsTab(pair,tgt){
  const ch5m=+(pair.priceChange?.m5||0),ch1h=+(pair.priceChange?.h1||0),ch24=+(pair.priceChange?.h24||0);
  const buys24=pair.txns?.h24?.buys||0,sells24=pair.txns?.h24?.sells||0;
  const buys5m=pair.txns?.m5?.buys||0,sells5m=pair.txns?.m5?.sells||0;
  const bpH=bp(buys24,sells24),bpM=bp(buys5m,sells5m);
  const vol24=+(pair.volume?.h24||0),liq=+(pair.liquidity?.usd||0);
  const vlRatio=liq>0?(vol24/liq).toFixed(2):'0';
  const momentum=ch5m>3&&ch1h>8;
  const volStr=vol24>0&&liq>0&&vol24/liq>2;
  const overExt=ch1h>80||ch24>300;
  const signals=[
    {name:'Momentum (5M/1H)',val:momentum?'Bullish':'Neutral',ok:momentum},
    {name:'Volume Strength',val:volStr?'Strong (V/L>2x)':'Weak',ok:volStr},
    {name:'Buy Pressure 24H',val:bpH+'%',ok:bpH>55},
    {name:'Buy Pressure 5M',val:bpM+'%',ok:bpM>55},
    {name:'Overextended',val:overExt?'Wait pullback':'No',ok:!overExt},
    {name:'Vol/Liq Ratio',val:vlRatio+'x',ok:+vlRatio>1&&+vlRatio<20},
  ];
  return`<div style="padding:8px">
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#484f58;letter-spacing:.5px;margin-bottom:6px">Technical Signals</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px">
      ${signals.map(s=>`<div style="background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:6px 8px">
        <div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">${esc(s.name)}</div>
        <div style="font-size:11px;font-weight:700;color:${s.ok?'#22c55e':'#f85149'}">${esc(s.val)}</div>
      </div>`).join('')}
    </div>
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#484f58;letter-spacing:.5px;margin-bottom:6px">Trade Levels</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      ${[['🛑 Stop Loss (-15%)',fP(tgt.sl),'#f85149'],['📥 Buy Zone (-10%)',fP(tgt.buyZone),'#e3b341'],['🎯 Target 1 (+50%)',fP(tgt.t1),'#22c55e'],['🚀 Target 2 (+150%)',fP(tgt.t2),'#00e5ff']].map(([l,v,c])=>`<div style="background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:7px 9px">
        <div style="font-size:9px;color:#484f58;margin-bottom:3px">${l}</div>
        <div style="font-size:14px;font-weight:900;color:${c}">${v}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderDCATab(pair){
  const price=+(pair.priceUsd||0);
  const dcaAmt=+S.dcaAmt||50,dcaFreq=S.dcaFreq||'weekly',dcaPeriods=+S.dcaPeriods||12;
  const totalInvested=dcaAmt*dcaPeriods;
  const tokensBought=price>0?dcaAmt/price:0;
  const totalTokens=tokensBought*dcaPeriods;
  const t1val=price*1.5,t2val=price*2.5;
  return`<div style="padding:10px;max-width:420px">
    <div style="font-size:11px;font-weight:700;margin-bottom:10px">💰 DCA Calculator</div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:10px;color:#484f58;width:120px">Amount per period ($)</label>
        <input class="dca-inp" style="width:100px" type="number" min="1" value="${dcaAmt}" oninput="S.dcaAmt=+this.value;renderMain()"/>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:10px;color:#484f58;width:120px">Frequency</label>
        <select class="dca-inp" style="width:100px" onchange="S.dcaFreq=this.value;renderMain()">
          ${[['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']].map(([v,l])=>`<option value="${v}" ${dcaFreq===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:10px;color:#484f58;width:120px">Number of periods</label>
        <input class="dca-inp" style="width:100px" type="number" min="1" max="52" value="${dcaPeriods}" oninput="S.dcaPeriods=+this.value;renderMain()"/>
      </div>
    </div>
    <div style="background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px">Total Invested</div><div style="font-size:14px;font-weight:900">$${totalInvested.toLocaleString()}</div></div>
      <div><div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px">Avg Entry</div><div style="font-size:14px;font-weight:900;color:#e3b341">${fP(price)}</div></div>
      <div><div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px">Tokens Acquired</div><div style="font-size:13px;font-weight:800;color:#58a6ff">${fN(totalTokens)}</div></div>
      <div><div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px">Cost per ${esc(dcaFreq)}</div><div style="font-size:13px;font-weight:800">$${dcaAmt}</div></div>
      <div><div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px">Value at T1 (+50%)</div><div style="font-size:13px;font-weight:800;color:#22c55e">$${(totalInvested*1.5).toFixed(0)}</div></div>
      <div><div style="font-size:8px;color:#484f58;text-transform:uppercase;letter-spacing:.4px">Value at T2 (+150%)</div><div style="font-size:13px;font-weight:800;color:#00e5ff">$${(totalInvested*2.5).toFixed(0)}</div></div>
    </div>
    <div style="margin-top:8px;font-size:9px;color:#484f58;text-align:center">⚠ Memecoins are high risk. DCA reduces timing risk but not total loss risk.</div>
  </div>`;
}

function renderRightPanel(pair,base,r){
  const rugRisks=(r?.risks||r?.riskFactors||[]);
  const score=+(r?.score||r?.riskScore||0);
  const scoreCol=score>700?'#f85149':score>400?'#e3b341':'#22c55e';
  const topH=(r?.topHolders||[]).slice(0,5);
  const top5pct=topH.reduce((s,h)=>s+(+h.pct||0),0);
  const mintOk=!r?.mintAuthority,freezeOk=!r?.freezeAuthority,lpOk=!!r?.lpBurned;
  return`<div class="be-right">
    <div style="padding:6px 8px;border-bottom:1px solid #21262d">
      <div style="font-size:8px;font-weight:800;text-transform:uppercase;color:#484f58;letter-spacing:.5px;margin-bottom:6px">Security</div>
      ${r?`<div style="font-size:22px;font-weight:900;color:${scoreCol};text-align:center;margin-bottom:4px">${score}</div>
      <div style="text-align:center;font-size:9px;color:${scoreCol};font-weight:700;margin-bottom:4px">${score>700?'🚨 HIGH RISK':score>400?'⚠ MED RISK':'✓ SAFE'}</div>`:`<div style="color:#484f58;font-size:9px;text-align:center;padding:8px"><span class="spin">⟳</span> Loading…</div>`}
    </div>
    <div class="sec-grid">
      <div class="sec-card"><div class="sec-card-val" style="color:${mintOk?'#22c55e':'#f85149'};font-size:11px">${mintOk?'✓ OK':'⚠ ON'}</div><div class="sec-card-lbl">Mint Auth</div></div>
      <div class="sec-card"><div class="sec-card-val" style="color:${freezeOk?'#22c55e':'#f85149'};font-size:11px">${freezeOk?'✓ OK':'⚠ ON'}</div><div class="sec-card-lbl">Freeze Auth</div></div>
      <div class="sec-card"><div class="sec-card-val" style="color:${lpOk?'#22c55e':'#e3b341'};font-size:11px">${lpOk?'✓ Burned':'⚠ No'}</div><div class="sec-card-lbl">LP Burned</div></div>
      <div class="sec-card"><div class="sec-card-val" style="color:${top5pct>30?'#f85149':'#22c55e'};font-size:11px">${top5pct?top5pct.toFixed(1)+'%':'—'}</div><div class="sec-card-lbl">Top 5 Hold.</div></div>
    </div>
    ${rugRisks.length?`<div style="padding:4px 6px;border-top:1px solid #21262d">
      <div style="font-size:8px;font-weight:700;text-transform:uppercase;color:#484f58;letter-spacing:.5px;padding:4px 2px">Risk Flags</div>
      ${rugRisks.slice(0,6).map(rf=>`<div style="display:flex;gap:4px;padding:3px 2px;border-bottom:1px solid #21262d08;align-items:flex-start">
        <span style="font-size:7px;font-weight:800;padding:1px 3px;border-radius:2px;flex-shrink:0;margin-top:1px;background:${rf.level==='danger'?'#f8514922':'#e3b34122'};color:${rf.level==='danger'?'#f85149':'#e3b341'}">${(rf.level||'INFO').toUpperCase()}</span>
        <span style="font-size:8px;color:#c9d1d9;line-height:1.3">${esc(rf.name||rf.title||'')}</span>
      </div>`).join('')}
    </div>`:''}
    ${topH.length?`<div style="padding:4px 6px;border-top:1px solid #21262d">
      <div style="font-size:8px;font-weight:700;text-transform:uppercase;color:#484f58;letter-spacing:.5px;padding:4px 2px">Top Holders</div>
      ${topH.map((h,i)=>{
        const wn=walletName(h.owner||h.address)||walletName(h.address)||null;
        return`<div style="display:flex;align-items:center;gap:3px;padding:2px 0;font-size:8px">
          <span style="color:#484f58;width:14px">${i+1}.</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;color:${wn?'#e3b341':'#484f58'}">${esc(wn||fAddr(h.owner||h.address))}</span>
          <span style="color:${+(h.pct||0)>5?'#f85149':'#c9d1d9'};font-weight:700">${(+(h.pct||0)).toFixed(1)}%</span>
        </div>`;
      }).join('')}
    </div>`:''}
  </div>`;
}

// ── BOOT ──
(function boot(){
  try{const r=localStorage.getItem('solt2_recent');if(r)S.recentScans=JSON.parse(r);}catch(_){}
  renderAll();
  loadFeed();
  setInterval(()=>{
    if(S.mode==='radar'&&!S.feedLoading)loadFeed();
    else if(S.mode!=='scan'&&S.termLoaded)loadTerminalData();
  },120000);
})();

</script>
